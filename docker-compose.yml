version: '3.8'

services:
  redis:
    image: redis:alpine
    command: redis-server --appendonly yes
    volumes:
      - ./redis_data:/data
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  core:
    build: 
      context: .
      args:
        APP_PATH: cmd/core/main.go
    ports:
      - "50051:50051"
      - "2112:2112"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis

  gateway:
    build:
      context: .
      args:
        APP_PATH: cmd/gateway/main.go # Передаем путь к шлюзу!
    ports:
      - "172.17.0.1:8085:8080"
    environment:
      - CORE_ADDR=core:50051
    depends_on:
      - core

  tgbot:
    build:
      context: .
      args:
        APP_PATH: cmd/tgbot/main.go
    environment:
      - TG_TOKEN=${TG_TOKEN}
      - CORE_ADDR=core:50051
      - BASE_URL=${BASE_URL}
    depends_on:
      - core

